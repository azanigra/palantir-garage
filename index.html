<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Normativa Municipal Bonaerense</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f6;color:#1a1a18;line-height:1.6}
.container{max-width:960px;margin:0 auto;padding:2rem 1rem}
header{border-bottom:1px solid #e0dfd8;padding-bottom:1.5rem;margin-bottom:2rem}
header h1{font-size:1.4rem;font-weight:500;margin-bottom:4px}
header p{font-size:13px;color:#888780}
header a{color:#888780;text-decoration:none}
header a:hover{color:#1a1a18}
.pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:2rem}
.pillar{background:#fff;border:0.5px solid #e0dfd8;border-radius:12px;padding:1.25rem;cursor:pointer;transition:border-color .15s}
.pillar:hover{border-color:#888780}
.pillar.active{border-color:#1a1a18}
.pillar-icon{font-size:20px;margin-bottom:8px}
.pillar-name{font-size:13px;font-weight:500;margin-bottom:4px}
.pillar-count{font-size:22px;font-weight:500;margin-bottom:2px}
.pillar-monto{font-size:12px;color:#888780}
.search-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;padding:8px 12px;border:0.5px solid #e0dfd8;border-radius:8px;font-size:14px;background:#fff;outline:none}
.search-bar input:focus{border-color:#888780}
.search-bar select{padding:8px 12px;border:0.5px solid #e0dfd8;border-radius:8px;font-size:14px;background:#fff;outline:none;cursor:pointer}
.results-header{font-size:13px;color:#888780;margin-bottom:12px}
.ord-list{display:flex;flex-direction:column;gap:8px}
.ord-card{background:#fff;border:0.5px solid #e0dfd8;border-radius:12px;padding:1rem 1.25rem;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
.ord-num{font-size:12px;color:#888780;margin-bottom:2px}
.ord-title{font-size:14px;font-weight:500;margin-bottom:4px}
.ord-meta{font-size:12px;color:#aaa}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:6px;font-weight:500}
.badge-salud{background:#E1F5EE;color:#085041}
.badge-educacion{background:#E6F1FB;color:#0C447C}
.badge-seguridad{background:#FAECE7;color:#712B13}
.badge-infraestructura{background:#FAEEDA;color:#633806}
.badge-tributario{background:#f1efe8;color:#444441}
.badge-social{background:#FBEAF0;color:#72243E}
.badge-transporte{background:#EAF3DE;color:#27500A}
.badge-presupuesto{background:#EEEDFE;color:#3C3489}
.monto{font-size:13px;font-weight:500;white-space:nowrap;margin-top:4px}
.empty{text-align:center;padding:3rem;color:#888780;font-size:14px}
footer{margin-top:3rem;padding-top:1.5rem;border-top:1px solid #e0dfd8;font-size:12px;color:#aaa;display:flex;justify-content:space-between;flex-wrap:gap}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Normativa municipal bonaerense</h1>
    <p>Datos oficiales del <a href="https://sibom.slyt.gba.gob.ar" target="_blank">SIBOM</a> — Provincia de Buenos Aires &middot; Fuente pública, sin editoriales</p>
  </header>

  <div class="pillars" id="pillars"></div>

  <div class="search-bar">
    <input type="text" id="q" placeholder="Buscar por tema, número o expediente..." oninput="render()">
    <select id="municipio" onchange="render()">
      <option value="">Todos los municipios</option>
    </select>
    <select id="tipo" onchange="render()">
      <option value="">Todos los tipos</option>
    </select>
  </div>

  <div class="results-header" id="results-header"></div>
  <div class="ord-list" id="list"></div>

  <footer>
    <span>Palantir Garage &mdash; <a href="https://github.com/azanigra/palantir-garage" target="_blank">github.com/azanigra/palantir-garage</a></span>
    <span>BSD 2-Clause &middot; Datos: SIBOM GBA</span>
  </footer>
</div>

<script>
const PILLAR_MAP = {
  salud:["salud","hospital","sanitaria","médico","vacunación","ambulancia","clínica"],
  educacion:["educación","educativo","docente","escuela","biblioteca","universidad","enseñanza"],
  seguridad:["seguridad","policial","protección","cámara","videovigilancia","emergencia"],
  infraestructura:["infraestructura","obra","construcción","calle","barrio","vivienda","pavimento","red cloacal","agua potable","alumbrado"]
};

const PILLAR_LABELS = {
  salud:{label:"Salud",icon:"🏥"},
  educacion:{label:"Educación",icon:"📚"},
  seguridad:{label:"Seguridad",icon:"🛡"},
  infraestructura:{label:"Infraestructura",icon:"🏗"}
};

let DATA = [];
let activePillar = null;

function detectPillar(ord){
  const text = (ord.titulo+" "+ord.tipo).toLowerCase();
  for(const [pillar,keywords] of Object.entries(PILLAR_MAP)){
    if(keywords.some(k=>text.includes(k))) return pillar;
  }
  return null;
}

function fmtMonto(n){
  if(n===null||n===undefined) return null;
  if(n>=1e9) return "$"+Math.round(n/1e9).toLocaleString("es-AR")+"B";
  if(n>=1e6) return "$"+Math.round(n/1e6).toLocaleString("es-AR")+"M";
  if(n>=1e3) return "$"+Math.round(n/1e3).toLocaleString("es-AR")+"K";
  return "$"+Math.round(n).toLocaleString("es-AR");
}

function renderPillars(){
  const el = document.getElementById("pillars");
  el.innerHTML = Object.entries(PILLAR_LABELS).map(([key,{label,icon}])=>{
    const items = DATA.filter(d=>detectPillar(d)===key);
    const total = items.reduce((a,b)=>a+(b.monto||0),0);
    return `<div class="pillar${activePillar===key?" active":""}" onclick="togglePillar('${key}')">
      <div class="pillar-icon">${icon}</div>
      <div class="pillar-name">${label}</div>
      <div class="pillar-count">${items.length}</div>
      <div class="pillar-monto">${total>0?fmtMonto(total)+" en montos declarados":"sin montos declarados"}</div>
    </div>`;
  }).join("");
}

function togglePillar(key){
  activePillar = activePillar===key?null:key;
  render();
}

function filtered(){
  const q = document.getElementById("q").value.toLowerCase();
  const municipio = document.getElementById("municipio").value;
  const tipo = document.getElementById("tipo").value;
  return DATA.filter(d=>{
    if(activePillar && detectPillar(d)!==activePillar) return false;
    if(municipio && d.municipio!==municipio) return false;
    if(tipo && d.tipo!==tipo) return false;
    if(q && !(d.titulo.toLowerCase().includes(q)||d.num.includes(q)||(d.expediente||"").toLowerCase().includes(q))) return false;
    return true;
  });
}

function populateSelects(){
  const municipios = [...new Set(DATA.map(d=>d.municipio).filter(Boolean))].sort();
  const tipos = [...new Set(DATA.map(d=>d.tipo).filter(Boolean))].sort();
  const mEl = document.getElementById("municipio");
  municipios.forEach(m=>{const o=document.createElement("option");o.value=m;o.textContent=m;mEl.appendChild(o);});
  const tEl = document.getElementById("tipo");
  tipos.forEach(t=>{const o=document.createElement("option");o.value=t;o.textContent=t;tEl.appendChild(o);});
}

function render(){
  renderPillars();
  const data = filtered();
  document.getElementById("results-header").textContent = data.length+" resultado"+(data.length!==1?"s":"")+" encontrado"+(data.length!==1?"s":"");
  if(!data.length){
    document.getElementById("list").innerHTML=`<div class="empty">Sin resultados para esta búsqueda.</div>`;
    return;
  }
  document.getElementById("list").innerHTML = data.map(d=>`
    <div class="ord-card">
      <div>
        <div class="ord-num">${d.municipio} &middot; Ord. N° ${d.num} &middot; ${d.fecha}</div>
        <div class="ord-title">${d.titulo}</div>
        <div class="ord-meta">Expediente: ${d.expediente||"—"}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <span class="badge badge-${d.tipo||"tributario"}">${d.tipo||"—"}</span>
        ${d.monto?`<span class="monto">${fmtMonto(d.monto)}</span>`:""}
      </div>
    </div>`).join("");
}

fetch("data/lamatanza.json")
  .then(r=>r.json())
  .then(json=>{
    DATA = json;
    populateSelects();
    render();
  })
  .catch(()=>{
    document.getElementById("list").innerHTML=`<div class="empty">No se pudieron cargar los datos. Verificá que existe el archivo data/lamatanza.json</div>`;
  });
</script>
</body>
</html>
